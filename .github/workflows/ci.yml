name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Least-privilege default for GITHUB_TOKEN; jobs elevate explicitly when needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which files have changed to determine which tests to run
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          # Use the PR target branch when available; fall back to the current ref for push events.
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          filters: |
            server:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'config/**'
              - 'client/**'
              - 'console/**'
              - 'echonet_lite/**'
              - 'protocol/**'
              - 'server/**'
              - 'integration/**'
              - '.github/workflows/ci.yml'
            web:
              - 'web/src/**'
              - 'web/package*.json'
              - 'web/.nvmrc'
              - 'web/tsconfig*.json'
              - 'web/vite.config.ts'
              - 'web/vitest.config.ts'
              - 'web/postcss.config.js'
              - 'web/tailwind.config.js'
              - 'web/eslint.config.ts'
              - 'web/index.html'
              - 'web/public/**'
              - '.github/workflows/ci.yml'
            docs:
              - '**.md'
              - 'docs/**'
              - '.vscode/**'
              - 'systemd/**'
              - '.github/**'
            scripts:
              - 'script/**/*.sh'
              - '.github/workflows/ci.yml'
  go-server:
    name: Go Server Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-v2-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-v2-

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted properly:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run tests
        run: go test -v -race -timeout=2m -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          file: ./coverage.out
          flags: go-server
          name: go-server-coverage

  web-ui:
    name: Web UI Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'

    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: web/.nvmrc
          cache: "npm"
          cache-dependency-path: "./web/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run lint, type check, and tests in parallel
        run: |
          set -euo pipefail

          pids=()
          npm run lint & pids+=("$!")
          npm run typecheck & pids+=("$!")
          npm run test -- --run & pids+=("$!")

          status=0
          for pid in "${pids[@]}"; do
            if ! wait "$pid"; then
              status=1
            fi
          done

          exit "$status"

      - name: Build application
        run: npm run build:vite

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          file: ./web/coverage/lcov.info
          flags: web-ui
          name: web-ui-coverage

  shell-scripts:
    name: Shell Scripts Quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.scripts == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: './script'
          format: gcc
          severity: info
        env:
          SHELLCHECK_OPTS: -e SC1091

  # Optional: Integration test job
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [changes]
    # Run when server or web changes exist
    if: |
      needs.changes.outputs.server == 'true' || needs.changes.outputs.web == 'true'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-v2-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-v2-

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: web/.nvmrc
          cache: "npm"
          cache-dependency-path: "./web/package-lock.json"

      - name: Install web dependencies (for integration tests)
        run: |
          set -euo pipefail

          cd web
          npm ci
      - name: Build Web UI (for integration tests)
        run: |
          set -euo pipefail

          cd web
          npm run build:vite
          cd ..

          # Verify bundle exists
          if [ ! -d "web/bundle" ]; then
            echo "ERROR: web/bundle directory not found after build"
            ls -la web/
            exit 1
          fi

          echo "✅ Web bundle built successfully:"
          ls -la web/bundle/

      - name: Run integration tests
        run: |
          # Double-check bundle exists before running tests
          if [ ! -d "web/bundle" ]; then
            echo "CRITICAL ERROR: web/bundle missing before integration tests"
            exit 1
          fi

          # Run integration tests
          go test -v -tags=integration -timeout=5m ./integration/tests/...

  # Summary job that provides a single status check for branch protection
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [changes, go-server, web-ui, shell-scripts, integration]
    if: always()

    steps:
      - name: Check CI Results
        run: |
          echo "Checking CI results..."
          echo "Server changes: ${{ needs.changes.outputs.server }}"
          echo "Web changes: ${{ needs.changes.outputs.web }}"
          echo "Scripts changes: ${{ needs.changes.outputs.scripts }}"
          echo "Docs only: ${{ needs.changes.outputs.docs }}"

          # Check if any tests were supposed to run
          if [[ "${{ needs.changes.outputs.server }}" == "true" || "${{ needs.changes.outputs.web }}" == "true" || "${{ needs.changes.outputs.scripts }}" == "true" ]]; then
            echo "Tests were executed. Checking results..."
            
            # Check if any job failed
            if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
              echo "❌ CI failed: One or more tests failed"
              exit 1
            fi
            
            # Check if any job was cancelled
            if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
              echo "⚠️ CI cancelled: One or more jobs were cancelled"
              exit 1
            fi
            
            echo "✅ All tests passed!"
          else
            echo "✅ No code changes detected - skipping tests"
          fi

          echo "CI completed successfully!"

  # Report-only npm dependency vulnerability scan (does not block CI)
  npm-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    permissions:
      contents: read
      pull-requests: write # job-level elevation: post/update the sticky audit comment

    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: web/.nvmrc

      - name: Run npm audit (report-only)
        id: audit
        run: |
          # Audit straight from the committed lockfile - no install required.
          npm audit --json --package-lock-only > audit.json || true

          # Decide from parsed JSON, not the exit code: a network failure also
          # makes `npm audit` exit non-zero but must not read as a vulnerability.
          if ! jq -e '.metadata.vulnerabilities' audit.json > /dev/null 2>&1; then
            echo "npm audit did not return valid data (possible network error) - skipping report."
            echo "findings=error" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          critical=$(jq '.metadata.vulnerabilities.critical // 0' audit.json)
          high=$(jq '.metadata.vulnerabilities.high // 0' audit.json)
          moderate=$(jq '.metadata.vulnerabilities.moderate // 0' audit.json)
          low=$(jq '.metadata.vulnerabilities.low // 0' audit.json)
          serious=$((critical + high))
          echo "findings=$serious" >> "$GITHUB_OUTPUT"

          {
            echo "## npm dependency audit"
            echo ""
            echo "| Severity | Count |"
            echo "| --- | --- |"
            echo "| Critical | $critical |"
            echo "| High | $high |"
            echo "| Moderate | $moderate |"
            echo "| Low | $low |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$serious" -gt 0 ]; then
            {
              echo "## :warning: npm dependency audit"
              echo ""
              echo "\`npm audit\` found **$serious high/critical** advisory(ies) in \`web/package-lock.json\`."
              echo ""
              echo "| Severity | Count |"
              echo "| --- | --- |"
              echo "| Critical | $critical |"
              echo "| High | $high |"
              echo "| Moderate | $moderate |"
              echo "| Low | $low |"
              echo ""
              echo "### Affected packages (high / critical)"
              echo ""
              jq -r '.vulnerabilities | to_entries[]
                | select(.value.severity == "high" or .value.severity == "critical")
                | "- `\(.value.name)` (\(.value.severity))"' audit.json
              echo ""
              echo "Run \`npm audit\` in \`web/\` for details; fixes usually arrive via Dependabot PRs."
              echo ""
              echo "_Report-only check - this does not block the pull request._"
            } > "$GITHUB_WORKSPACE/npm-audit-report.md"
          fi

      - name: Update sticky audit comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- npm-audit-report -->';
            const findings = '${{ steps.audit.outputs.findings }}';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (findings !== 'error' && Number(findings) > 0) {
              const body = `${marker}\n${fs.readFileSync('npm-audit-report.md', 'utf8')}`;
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } else if (existing) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
            }

  # Report-only Go vulnerability scan (does not block CI)
  go-vuln:
    name: Go Vulnerability Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'
    permissions:
      contents: read
      pull-requests: write # job-level elevation: post/update the sticky scan comment

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck (report-only)
        id: vuln
        run: |
          set +e
          govulncheck ./... > govulncheck.txt 2>&1
          code=$?
          set -e
          cat govulncheck.txt

          # govulncheck exit codes: 0 = clean, 3 = vulnerabilities found, other = error.
          case "$code" in
            0)
              echo "findings=0" >> "$GITHUB_OUTPUT"
              {
                echo "## Go vulnerability scan"
                echo "No vulnerabilities found by govulncheck."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            3)
              echo "findings=1" >> "$GITHUB_OUTPUT"
              {
                echo "## :warning: Go vulnerability scan"
                echo ""
                echo "\`govulncheck\` found vulnerabilities reachable from this module."
                echo ""
                echo "<details><summary>govulncheck output</summary>"
                echo ""
                echo '```'
                cat govulncheck.txt
                echo '```'
                echo ""
                echo "</details>"
                echo ""
                echo "_Report-only check - this does not block the pull request._"
              } > "$GITHUB_WORKSPACE/govulncheck-report.md"
              cat "$GITHUB_WORKSPACE/govulncheck-report.md" >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              echo "findings=error" >> "$GITHUB_OUTPUT"
              echo "govulncheck did not complete (exit $code) - skipping report."
              ;;
          esac

      - name: Update sticky scan comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- govulncheck-report -->';
            const findings = '${{ steps.vuln.outputs.findings }}';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (findings === '1') {
              const body = `${marker}\n${fs.readFileSync('govulncheck-report.md', 'utf8')}`;
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            } else if (existing) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
            }
